name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Suggest a feature or improvement for WP Send Message.

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: Is your feature request related to a problem? Describe the use case.
      placeholder: I'm trying to... but currently...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you've considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Contacts management
        - SMS sending
        - E-mail sending
        - Admin UI / UX
        - Settings / configuration
        - Database
        - Other
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
