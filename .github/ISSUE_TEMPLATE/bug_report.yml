name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: wp-version
    attributes:
      label: WordPress version
      placeholder: "e.g. 6.8"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "e.g. 8.2"
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local (XAMPP / Local WP / Docker)
        - Staging
        - Production
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / logs
      description: Add screenshots, browser console errors, or PHP error logs if available.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
